<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ultimate Flip Card Memory Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

h1{
  margin:15px 0 5px;
  font-size:2rem;
  color:#ffeb3b;
  text-shadow:1px 1px 5px #000;
}

.stats{
  display:flex;
  gap:20px;
  margin-bottom:10px;
  font-size:18px;
  font-weight:600;
}

.stats span{
  color:#00ffea;
}

.time-warning{
  color:#ff4444 !important;
  animation:timerPulse .6s infinite;
}

@keyframes timerPulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

#pauseBtn{
  margin-bottom:15px;
  padding:8px 18px;
  font-size:16px;
  background:#00c3ff;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

.game-board{
  display:grid;
  gap:12px;
  justify-content:center;
  padding:10px;
}

.card{
  width:90px;
  height:90px;
  perspective:1000px;
}

.card-inner{
  width:100%;
  height:100%;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .5s;
  border-radius:12px;
}

.card.flipped .card-inner{
  transform:rotateY(180deg);
}

.card-front,.card-back{
  position:absolute;
  width:100%;
  height:100%;
  border-radius:12px;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:40px;
  box-shadow:0 4px 8px rgba(0,0,0,.3);
}

.card-front{
  transform:rotateY(180deg);
  background:#fff;
  color:#333;
}

.card-back{
  background:#ff9800;
  color:#fff;
  font-size:28px;
  cursor:pointer;
}

/* Overlay screens */

.overlayScreen{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-size:2rem;
  text-align:center;
  color:#fff;
}

#victoryScreen h2{color:#ffeb3b; animation:glow 1s infinite alternate;}
#timeUpScreen h2,#gameOverScreen h2{color:#ff4444; animation:pulse 1s infinite;}
#levelCompleteScreen h2{color:#00ffea; animation:glow 1s infinite alternate;}

button{
  margin-top:20px;
  padding:10px 20px;
  font-size:18px;
  border:none;
  background:#ff9800;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

@keyframes glow{
  from{ text-shadow:0 0 10px yellow;}
  to{ text-shadow:0 0 30px orange;}
}
@keyframes pulse{
  0%{transform:scale(1)}
  50%{transform:scale(1.2)}
  100%{transform:scale(1)}
}
.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall 3s linear forwards;
}
@keyframes fall{
  to{
    transform:translateY(100vh) rotate(720deg);
    opacity:0;
  }
}
</style>
</head>

<body>

<h1>🧠 Flip Card Memory Game</h1>

<div class="stats">
  <div>Level: <span id="level">1</span></div>
  <div>⏱ Time: <span id="time">0</span>s</div>
  <div>🏅 Score: <span id="score">0</span></div>
  <div>❌ Time-Ups: <span id="strikes">0</span>/3</div>
</div>

<button onclick="togglePause()" id="pauseBtn">⏸ Pause</button>

<div class="game-board" id="gameBoard"></div>

<!-- Overlay Screens -->
<div id="victoryScreen" class="overlayScreen">
  <h2>🏆 YOU WON!</h2>
  <p>All Levels Completed!</p>
  <button onclick="restartGame()">Play Again</button>
</div>

<div id="timeUpScreen" class="overlayScreen">
  <h2>⏰ TIME'S UP!</h2>
  <p>Try Again</p>
  <button onclick="restartLevel()">Retry</button>
</div>

<div id="gameOverScreen" class="overlayScreen">
  <h2>💀 GAME OVER!</h2>
  <p>You ran out of time 3 times!</p>
  <button onclick="restartGame()">Restart Game</button>
</div>

<div id="levelCompleteScreen" class="overlayScreen">
  <h2>🎉 LEVEL COMPLETE!</h2>
  <p>Score: <span id="levelScore">0</span></p>
  <p>Time Taken: <span id="levelTime">0</span>s</p>
  <button onclick="nextLevelFromScreen()">Next Level </button>
</div>

<!-- SOUND EFFECTS -->
<audio id="flipSound" preload="auto" src="c:\Users\user\Downloads\game\flip effect.mp4"></audio>
<audio id="matchSound" preload="auto" src="c:\Users\user\Downloads\game\Game Background Sound Effect.mp3"></audio>
<audio id="winSound" preload="auto" src="c:\Users\user\Downloads\game\WIN sound effect no copyright.mp3"></audio>
<audio id="loseSound" preload="auto" src="c:\Users\user\Downloads\game\Sad Game Over Sound Effect.mp3"></audio>

<script>
let level=1, score=0, timer=0, timerInterval, timeLimit=0;
let firstCard=null, secondCard=null, lockBoard=false;
let isPaused=false, timeUpTriggered=false, timeUpCount=0, matchedPairs=0;

const icons=["🐦","🏢","🌆","🌉","🏙️","🌃","🕊️","🦅","🦜","🪶","🦉","🦢"];
const flipSound=document.getElementById("flipSound");
const matchSound=document.getElementById("matchSound");
const winSound=document.getElementById("winSound");
const loseSound=document.getElementById("loseSound");

let flipSoundDelay=80;

function playSound(sound){
  sound.pause();
  sound.currentTime=0;
  sound.play().catch(()=>{});
}

function updateTimer(){
  if(isPaused) return;

  let remaining = timeLimit - timer;
  const timeElem=document.getElementById("time");

  if(remaining <=0){
    timeElem.textContent=0;
    clearInterval(timerInterval);

    if(!timeUpTriggered){
      timeUpTriggered=true;
      playSound(loseSound);
      timeUpCount++;
      document.getElementById("strikes").textContent=timeUpCount;

      if(timeUpCount >=3){
        document.getElementById("timeUpScreen").style.display="none";
        document.getElementById("gameOverScreen").style.display="flex";
      } else {
        showTimeUp();
      }
    }
    return;
  }

  timeElem.textContent=remaining;
  if(remaining<=5){
    timeElem.classList.add("time-warning");
  } else {
    timeElem.classList.remove("time-warning");
  }

  timer++;
}

function togglePause(){
  isPaused = !isPaused;
  document.getElementById("pauseBtn").innerText = isPaused ? "▶ Resume" : "⏸ Pause";
}

function startLevel(){
  clearInterval(timerInterval);
  timer=0; matchedPairs=0; firstCard=null; secondCard=null; lockBoard=false;
  isPaused=false; timeUpTriggered=false;

  document.getElementById("level").textContent=level;
  document.getElementById("score").textContent=score;
  document.getElementById("strikes").textContent=timeUpCount;

  timeLimit=10+level*5;
  document.getElementById("time").textContent=timeLimit;

  timerInterval=setInterval(updateTimer,1000);

  const board=document.getElementById("gameBoard");
  board.innerHTML="";

  let pairs=level+1;
  let selected=icons.slice(0,pairs);
  let cards=[...selected,...selected].sort(()=>Math.random()-.5);

  let columns=Math.ceil(Math.sqrt(cards.length));
  board.style.gridTemplateColumns=`repeat(${columns},auto)`;

  cards.forEach(icon=>{
    const card=document.createElement("div");
    card.className="card";
    card.dataset.icon=icon;
    card.innerHTML=`<div class="card-inner"><div class="card-front">${icon}</div><div class="card-back">❓</div></div>`;
    card.addEventListener("click",()=>{ if(!isPaused) flipCard(card) });
    board.appendChild(card);
  });
}

function flipCard(card){
  if(lockBoard || card.classList.contains("flipped") || isPaused) return;

  card.classList.add("flipped");
  setTimeout(()=>playSound(flipSound), flipSoundDelay);

  if(!firstCard){ firstCard=card; return }
  secondCard=card;
  lockBoard=true;

  if(firstCard.dataset.icon===secondCard.dataset.icon){
    playSound(matchSound);
    matchedPairs++;
    score+=100;
    document.getElementById("score").textContent=score;
    resetTurn();
    if(matchedPairs===level+1) setTimeout(nextLevel,500);
  } else {
    score=Math.max(0,score-40);
    document.getElementById("score").textContent=score;
    setTimeout(()=>{
      firstCard.classList.remove("flipped");
      secondCard.classList.remove("flipped");
      resetTurn();
    },800);
  }
}

function resetTurn(){ [firstCard,secondCard]=[null,null]; lockBoard=false }

// === FIX: Show YOU WON directly when last level is completed ===
function nextLevel(){
  clearInterval(timerInterval);
  if(level === 10){
    showVictory(); // last level → direct victory
  } else {
    document.getElementById("levelScore").textContent = score;
    document.getElementById("levelTime").textContent = timer;
    document.getElementById("levelCompleteScreen").style.display = "flex";
  }
}

function nextLevelFromScreen(){
  document.getElementById("levelCompleteScreen").style.display = "none";
  level++;
  startLevel();
}

function showVictory(){
  playSound(winSound);
  document.getElementById("victoryScreen").style.display="flex";

  for(let i=0;i<120;i++){
    const confetti=document.createElement("div");
    confetti.className="confetti";
    confetti.style.left=Math.random()*100+"vw";
    confetti.style.background=`hsl(${Math.random()*360},100%,50%)`;
    confetti.style.animationDuration=(Math.random()*3+2)+"s";
    document.body.appendChild(confetti);
    setTimeout(()=>{confetti.remove()},4000);
  }
}

function showTimeUp(){ document.getElementById("timeUpScreen").style.display="flex" }

function restartLevel(){ 
  document.getElementById("timeUpScreen").style.display="none";
  startLevel();
}

function restartGame(){ 
  document.getElementById("victoryScreen").style.display="none"; 
  document.getElementById("gameOverScreen").style.display="none";
  timeUpCount=0; 
  level=1; score=0; 
  startLevel(); 
}

startLevel();
</script>
</body>
</html>
